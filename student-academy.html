<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Academy — Boshqaruv Tizimi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
--navy-950:#060d1a;--navy-900:#0a1628;--navy-800:#0d1f3c;--navy-700:#1a3060;
--navy-600:#1e3a6e;--navy-400:#2d5299;--gold:#f0b429;--gold-light:#fde68a;
--gold-dark:#c17d0d;--white:#fff;--bg:#f0f4f8;--bg2:#e8edf5;
--text:#1a2040;--text2:#4a5568;--text3:#8898b3;
--success:#16a34a;--success-bg:#dcfce7;--danger:#dc2626;--danger-bg:#fee2e2;
--warn:#d97706;--warn-bg:#fef3c7;--info:#2563eb;--info-bg:#dbeafe;
--radius:12px;--radius-sm:8px;--sidebar:260px;
--shadow:0 2px 12px rgba(10,22,40,.10),0 1px 3px rgba(10,22,40,.08);
--shadow-lg:0 8px 32px rgba(10,22,40,.14),0 2px 8px rgba(10,22,40,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
input,select,textarea,button{font-family:inherit}
button{cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--navy-700);border-radius:3px}

/* ===== LOGIN ===== */
#loginPage{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy-950) 0%,var(--navy-800) 50%,var(--navy-700) 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--white);border-radius:20px;padding:48px 40px;width:420px;max-width:92vw;box-shadow:var(--shadow-lg);animation:fadeInUp .5s ease}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo img{width:100px;height:100px;object-fit:contain}
.login-logo h1{font-family:'Playfair Display',serif;font-size:24px;color:var(--navy-900);margin-top:12px;letter-spacing:-.5px}
.login-logo p{font-size:13px;color:var(--text3);margin-top:4px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid #dde4f0;border-radius:var(--radius-sm);font-size:14px;color:var(--text);outline:none;transition:.2s;background:#f8faff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--navy-600);background:var(--white);box-shadow:0 0 0 3px rgba(30,58,110,.10)}
.input-icon{position:relative}
.input-icon i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px}
.input-icon input{padding-left:38px}
.btn-primary{width:100%;padding:13px;background:var(--navy-700);color:var(--white);border-radius:var(--radius-sm);font-size:15px;font-weight:600;transition:.2s;letter-spacing:.3px}
.btn-primary:hover{background:var(--navy-600);transform:translateY(-1px);box-shadow:0 4px 12px rgba(30,58,110,.3)}
.btn-primary:active{transform:translateY(0)}
.login-error{background:var(--danger-bg);color:var(--danger);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:none;border-left:3px solid var(--danger)}
.login-hint{margin-top:24px;padding-top:20px;border-top:1px solid #eef2ff;font-size:12px;color:var(--text3)}
.login-hint p{margin-bottom:4px}
.login-hint strong{color:var(--text2)}

/* ===== LAYOUT ===== */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--navy-950);display:flex;flex-direction:column;z-index:100;transition:.3s}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-inner{display:flex;align-items:center;gap:12px}
.sidebar-logo img{width:44px;height:44px;object-fit:contain}
.sidebar-logo-text h2{font-family:'Playfair Display',serif;font-size:15px;color:var(--white);line-height:1.2}
.sidebar-logo-text p{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.sidebar-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--navy-900);flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-info h4{font-size:13px;color:var(--white);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-info p{font-size:11px;color:rgba(255,255,255,.4)}
.role-badge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.role-admin{background:rgba(240,180,41,.15);color:var(--gold)}
.role-manager{background:rgba(37,99,235,.15);color:#60a5fa}
.role-teacher{background:rgba(22,163,74,.15);color:#4ade80}
nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:0 14px;margin-bottom:4px}
.nav-section-title{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;padding:8px 6px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);color:rgba(255,255,255,.55);font-size:13.5px;font-weight:400;transition:.15s;cursor:pointer;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(240,180,41,.12);color:var(--gold);font-weight:500}
.nav-item i{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:2px 6px;border-radius:20px}
.sidebar-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.07)}
.btn-logout{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.4);font-size:13px;transition:.2s;padding:8px 0}
.btn-logout:hover{color:var(--danger)}

.main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid #eef2ff;padding:0 28px;height:60px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title h2{font-size:18px;font-weight:600;color:var(--text)}
.topbar-title p{font-size:12px;color:var(--text3)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-date{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.content{flex:1;padding:24px 28px;overflow-y:auto}

/* ===== CARDS ===== */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:18px 22px;border-bottom:1px solid #eef2ff;display:flex;align-items:center;gap:12px}
.card-header h3{font-size:15px;font-weight:600;color:var(--text)}
.card-header p{font-size:12px;color:var(--text3);margin-top:2px}
.card-header-actions{margin-left:auto;display:flex;gap:8px}
.card-body{padding:20px 22px}

/* ===== STAT CARDS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:.2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-icon.navy{background:rgba(10,22,40,.08);color:var(--navy-700)}
.stat-icon.gold{background:rgba(240,180,41,.12);color:var(--gold-dark)}
.stat-icon.green{background:var(--success-bg);color:var(--success)}
.stat-icon.red{background:var(--danger-bg);color:var(--danger)}
.stat-icon.blue{background:var(--info-bg);color:var(--info)}
.stat-info h3{font-size:26px;font-weight:600;color:var(--text);line-height:1}
.stat-info p{font-size:12px;color:var(--text3);margin-top:4px}
.stat-info .trend{font-size:11px;margin-top:6px;display:flex;align-items:center;gap:4px}
.trend.up{color:var(--success)}
.trend.down{color:var(--danger)}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;transition:.2s;cursor:pointer;white-space:nowrap}
.btn-navy{background:var(--navy-700);color:var(--white)}
.btn-navy:hover{background:var(--navy-600)}
.btn-gold{background:var(--gold);color:var(--navy-900)}
.btn-gold:hover{background:var(--gold-dark);color:var(--white)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-outline{background:transparent;color:var(--navy-600);border:1.5px solid #dde4f0}
.btn-outline:hover{border-color:var(--navy-600);background:rgba(30,58,110,.04)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:8px;border-radius:var(--radius-sm);background:transparent;color:var(--text2);transition:.15s}
.btn-icon:hover{background:#eef2ff;color:var(--navy-600)}
.btn-icon.danger:hover{background:var(--danger-bg);color:var(--danger)}

/* ===== TABLE ===== */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{background:#f8faff;color:var(--text2);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:11px 14px;text-align:left;border-bottom:1.5px solid #eef2ff;white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f4f8;transition:.15s}
tbody tr:hover{background:#f8faff}
tbody td{padding:12px 14px;color:var(--text);vertical-align:middle}
tbody tr:last-child{border-bottom:none}
.no-data{text-align:center;padding:60px 20px;color:var(--text3)}
.no-data i{font-size:40px;margin-bottom:12px;display:block}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:500}
.badge-success{background:var(--success-bg);color:var(--success)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-navy{background:rgba(10,22,40,.08);color:var(--navy-700)}
.badge-gold{background:rgba(240,180,41,.15);color:var(--gold-dark)}

/* ===== TOGGLE CHECKBOX ===== */
.toggle-cell{display:flex;justify-content:center}
.toggle{position:relative;display:inline-block;width:42px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#dde4f0;border-radius:12px;transition:.2s;cursor:pointer}
.toggle-slider:before{position:absolute;content:'';height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider{background:var(--success)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.toggle.hw input:checked+.toggle-slider{background:var(--gold-dark)}
.toggle input:disabled+.toggle-slider{opacity:.5;cursor:not-allowed}

/* ===== PROGRESS BAR ===== */
.progress-bar{height:8px;background:#eef2ff;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:.4s}
.progress-fill.green{background:var(--success)}
.progress-fill.gold{background:var(--gold)}
.progress-fill.red{background:var(--danger)}

/* ===== JOURNAL STATS BAR ===== */
.journal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:20px 0}
.j-stat{background:var(--white);border:1.5px solid #eef2ff;border-radius:var(--radius-sm);padding:14px 16px;text-align:center}
.j-stat .num{font-size:28px;font-weight:700;line-height:1}
.j-stat .lbl{font-size:11px;color:var(--text3);margin-top:4px}
.j-stat.green .num{color:var(--success)}
.j-stat.gold .num{color:var(--gold-dark)}
.j-stat.red .num{color:var(--danger)}
.j-stat.navy .num{color:var(--navy-700)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(6,13,26,.6);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(2px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:16px;width:520px;max-width:94vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(20px);transition:.25s;box-shadow:var(--shadow-lg)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:20px 24px;border-bottom:1px solid #eef2ff;display:flex;align-items:center;gap:12px}
.modal-header h3{font-size:16px;font-weight:600;flex:1}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid #eef2ff;display:flex;gap:10px;justify-content:flex-end}
.modal-lg .modal{width:720px}

/* ===== SEARCH + FILTER ===== */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:200px;max-width:340px}
.search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.search-box input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid #dde4f0;border-radius:var(--radius-sm);font-size:13.5px;color:var(--text);outline:none;transition:.2s;background:#f8faff}
.search-box input:focus{border-color:var(--navy-600);background:var(--white)}
select.filter{padding:9px 12px;border:1.5px solid #dde4f0;border-radius:var(--radius-sm);font-size:13.5px;color:var(--text2);background:#f8faff;outline:none;cursor:pointer;transition:.2s}
select.filter:focus{border-color:var(--navy-600)}

/* ===== FORM ROWS ===== */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}

/* ===== MONTH CALENDAR ===== */
.month-view{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:16px}
.month-day-header{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;text-transform:uppercase}
.month-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;transition:.15s;position:relative;flex-direction:column;gap:2px}
.month-day:hover{background:#eef2ff}
.month-day.today{background:var(--navy-700);color:#fff;font-weight:600}
.month-day.selected{background:var(--gold);color:var(--navy-900);font-weight:600}
.month-day.has-data::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--success);position:absolute;bottom:4px}
.month-day.empty{cursor:default}
.month-day.today.has-data::after{background:var(--gold)}

/* ===== PAYMENT TABLE ===== */
.payment-month-cell{min-width:70px;text-align:center;padding:8px 4px!important}
.pay-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:auto;cursor:pointer;font-size:12px;font-weight:600;transition:.15s;border:2px solid transparent}
.pay-dot.paid{background:var(--success);color:#fff;border-color:var(--success)}
.pay-dot.unpaid{background:#eef2ff;color:var(--text3);border-color:#dde4f0}
.pay-dot.unpaid:hover{border-color:var(--success);color:var(--success)}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{background:var(--navy-900);color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;max-width:320px}
.toast-item.success{border-left:3px solid var(--success)}
.toast-item.error{border-left:3px solid var(--danger)}
.toast-item.info{border-left:3px solid var(--gold)}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.page{animation:fadeInUp .35s ease}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .stats-grid{grid-template-columns:1fr 1fr}
  .journal-stats{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .topbar{padding:0 16px}
  .content{padding:16px}
}

/* ===== HISTORY TABLE ===== */
.history-row td{font-size:12.5px;padding:8px 14px}
.att-cell{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:500}
.att-present{background:var(--success-bg);color:var(--success)}
.att-absent{background:var(--danger-bg);color:var(--danger)}
.hw-done{background:rgba(240,180,41,.15);color:var(--gold-dark)}
.hw-miss{background:#f3f4f6;color:#9ca3af}

/* ===== DASHBOARD CHARTS ===== */
.mini-bar{display:flex;flex-direction:column;gap:8px}
.mini-bar-row{display:flex;align-items:center;gap:10px;font-size:13px}
.mini-bar-label{width:120px;color:var(--text2);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-bar-track{flex:1;height:8px;background:#eef2ff;border-radius:4px;overflow:hidden}
.mini-bar-fill{height:100%;background:var(--navy-700);border-radius:4px;transition:.5s}
.mini-bar-pct{width:40px;text-align:right;font-size:12px;font-weight:600;color:var(--navy-700)}

/* activity feed */
.activity-feed{display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f0f4f8}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.activity-text{flex:1}
.activity-text strong{font-size:13.5px;color:var(--text)}
.activity-text p{font-size:12px;color:var(--text3);margin-top:2px}
.activity-time{font-size:11.5px;color:var(--text3)}

/* ===== PROFILE ===== */
.profile-card{display:flex;align-items:center;gap:20px;margin-bottom:24px}
.profile-avatar-lg{width:72px;height:72px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:var(--navy-900);flex-shrink:0}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
<div class="login-card">
  <div class="login-logo">
    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iIzBhMTYyOCIvPjx0ZXh0IHg9IjUwIiB5PSI2NSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1zaXplPSI1NSIgZmlsbD0iI2YwYjQyOSI+🎓PC90ZXh0Pjwvc3ZnPg==" alt="logo" id="loginLogoImg">

</div>

<!-- MAIN APP -->

<script>
// ===================== DATA LAYER =====================
const DB = {
  get(k){try{return JSON.parse(localStorage.getItem('sa_'+k))||[]}catch{return[]}},
  set(k,v){localStorage.setItem('sa_'+k,JSON.stringify(v))},
  getOne(k){try{return JSON.parse(localStorage.getItem('sa_'+k))}catch{return null}},
  setOne(k,v){localStorage.setItem('sa_'+k,JSON.stringify(v))}
};
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}

// ===================== INIT DATA =====================
function initData(){
  if(localStorage.getItem('sa_initialized')){ return; }
  const users=[
    {id:'u1',name:'Admin Superuser',username:'admin',password:'admin123',role:'admin',phone:'',groupIds:[]},
    {id:'u2',name:'Manager Aziz',username:'manager',password:'manager123',role:'manager',phone:'+998901234567',groupIds:[]},
    {id:'u3',name:'Malika Karimova',username:'teacher',password:'teacher123',role:'teacher',phone:'+998991234567',subject:'Matematika',groupIds:['g1','g2']}
  ];
  const groups=[
    {id:'g1',name:'Matematika — 9A',teacherId:'u3',schedule:'Du,Cho,Ju',startTime:'09:00',endTime:'10:30',monthlyFee:400000,room:'101'},
    {id:'g2',name:'Matematika — 10B',teacherId:'u3',schedule:'Se,Pa,Sha',startTime:'11:00',endTime:'12:30',monthlyFee:450000,room:'102'}
  ];
  const students=[
    {id:'s1',name:'Aliyev Bobur',groupId:'g1',phone:'+998901000001',parentPhone:'+998991000001',address:'Chilonzor',joinDate:'2024-01-15',active:true,note:''},
    {id:'s2',name:'Nazarov Jasur',groupId:'g1',phone:'+998901000002',parentPhone:'+998991000002',address:'Yunusobod',joinDate:'2024-01-15',active:true,note:''},
    {id:'s3',name:'Toshmatova Zilola',groupId:'g1',phone:'+998901000003',parentPhone:'+998991000003',address:'Mirzo Ulug\'bek',joinDate:'2024-02-01',active:true,note:''},
    {id:'s4',name:'Raxmatullayev Sherzod',groupId:'g1',phone:'+998901000004',parentPhone:'+998991000004',address:'Sergeli',joinDate:'2024-02-01',active:true,note:''},
    {id:'s5',name:'Hasanova Mohira',groupId:'g1',phone:'+998901000005',parentPhone:'+998991000005',address:'Bektemir',joinDate:'2024-03-01',active:true,note:''},
    {id:'s6',name:'Jurayev Otabek',groupId:'g2',phone:'+998901000006',parentPhone:'+998991000006',address:'Shayxontohur',joinDate:'2024-01-20',active:true,note:''},
    {id:'s7',name:'Mirzayeva Dildora',groupId:'g2',phone:'+998901000007',parentPhone:'+998991000007',address:'Olmazor',joinDate:'2024-01-20',active:true,note:''},
    {id:'s8',name:'Qodirov Firdavs',groupId:'g2',phone:'+998901000008',parentPhone:'+998991000008',address:'Uchtepa',joinDate:'2024-02-15',active:true,note:''},
    {id:'s9',name:'Sultanova Nilufar',groupId:'g2',phone:'+998901000009',parentPhone:'+998991000009',address:'Yakkasaroy',joinDate:'2024-03-10',active:true,note:''}
  ];
  // Generate sample attendance for last 7 days
  const attendance=[];
  const today=new Date();
  for(let d=6;d>=0;d--){
    const date=new Date(today);date.setDate(today.getDate()-d);
    const dateStr=fmtDate(date);
    students.forEach(s=>{
      const present=Math.random()>.25;
      attendance.push({id:uid(),studentId:s.id,groupId:s.groupId,date:dateStr,present,homeworkDone:present?Math.random()>.35:false,note:''});
    });
  }
  // Generate payments for current + last 2 months
  const payments=[];
  const now=new Date();
  for(let m=2;m>=0;m--){
    const d=new Date(now.getFullYear(),now.getMonth()-m,1);
    students.forEach(s=>{
      const grp=groups.find(g=>g.id===s.groupId);
      const paid=m>0||Math.random()>.4;
      payments.push({id:uid(),studentId:s.id,groupId:s.groupId,month:d.getMonth()+1,year:d.getFullYear(),amount:grp.monthlyFee,paid,paidDate:paid?fmtDate(new Date(d.getFullYear(),d.getMonth(),Math.floor(Math.random()*20)+1)):null,discount:0});
    });
  }
  DB.set('users',users);DB.set('groups',groups);DB.set('students',students);
  DB.set('attendance',attendance);DB.set('payments',payments);
  localStorage.setItem('sa_initialized','1');
}

// ===================== HELPERS =====================
function fmtDate(d){const dd=d||new Date();return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`}
function fmtDateUz(ds){if(!ds)return '—';const[y,m,d]=ds.split('-');const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return `${d} ${months[+m-1]} ${y}`}
function fmtMoney(n){return new Intl.NumberFormat('uz-UZ').format(n||0)+' so\'m'}
function getInitials(name){return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function avatarColor(id){const colors=['#0d1f3c','#1a3060','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2'];return colors[id.charCodeAt(0)%colors.length]}

// ===================== AUTH =====================
let currentUser=null;
function doLogin(){
  const u=document.getElementById('loginUsername').value.trim();
  const p=document.getElementById('loginPassword').value.trim();
  const users=DB.get('users');
  const found=users.find(x=>x.username===u&&x.password===p);
  if(!found){document.getElementById('loginError').style.display='block';return;}
  currentUser=found;
  DB.setOne('currentUser',found);
  document.getElementById('loginError').style.display='none';
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='block';
  initApp();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginPage').style.display!=='none')doLogin()});
function doLogout(){
  currentUser=null;DB.setOne('currentUser',null);
  document.getElementById('app').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginPassword').value='';
}

function can(role){
  if(!currentUser)return false;
  if(role==='admin')return currentUser.role==='admin';
  if(role==='manager')return currentUser.role==='admin'||currentUser.role==='manager';
  return true;
}

// ===================== SIDEBAR =====================
const NAV_ITEMS=[
  {id:'dashboard',label:'Dashboard',icon:'fas fa-chart-pie',roles:['admin','manager','teacher']},
  {id:'journal',label:'Online Jurnal',icon:'fas fa-clipboard-list',roles:['admin','manager','teacher']},
  {id:'students',label:'O\'quvchilar',icon:'fas fa-user-graduate',roles:['admin','manager','teacher']},
  {id:'groups',label:'Guruhlar',icon:'fas fa-layer-group',roles:['admin','manager','teacher']},
  {id:'payments',label:'To\'lovlar',icon:'fas fa-credit-card',roles:['admin','manager']},
  {id:'teachers',label:'O\'qituvchilar',icon:'fas fa-chalkboard-teacher',roles:['admin','manager']},
  {id:'settings',label:'Sozlamalar',icon:'fas fa-cog',roles:['admin','manager','teacher']}
];
let activePage='dashboard';

function buildSidebar(){
  // logo image — use uploaded logo or fallback emoji
  const logoSrc='/student-academy-logo.png';
  document.getElementById('sidebarLogoImg').src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="%230a1628"/><text x="50" y="65" text-anchor="middle" font-size="50" fill="%23f0b429">🎓</text></svg>';

  // User info
  document.getElementById('sidebarUser').innerHTML=`
    <div class="user-avatar" style="background:${avatarColor(currentUser.id)}">${getInitials(currentUser.name)}</div>
    <div class="user-info">
      <h4>${currentUser.name}</h4>
      <span class="role-badge role-${currentUser.role}">${currentUser.role==='admin'?'Admin':currentUser.role==='manager'?'Manager':'O\'qituvchi'}</span>
    </div>`;

  // Nav
  const nav=document.getElementById('sidebarNav');
  nav.innerHTML='<div class="nav-section"><div class="nav-section-title">Menyu</div></div>';
  NAV_ITEMS.forEach(item=>{
    if(!item.roles.includes(currentUser.role))return;
    const div=document.createElement('div');
    div.className='nav-section';
    div.innerHTML=`<div class="nav-item${activePage===item.id?' active':''}" data-page="${item.id}">
      <i class="${item.icon}"></i>${item.label}</div>`;
    nav.appendChild(div);
  });
  nav.querySelectorAll('.nav-item').forEach(el=>{
    el.addEventListener('click',()=>navigateTo(el.dataset.page));
  });
}

function navigateTo(page){
  activePage=page;
  buildSidebar();
  const titles={dashboard:'Dashboard',journal:'Online Jurnal',students:'O\'quvchilar',groups:'Guruhlar',payments:'To\'lovlar',teachers:'O\'qituvchilar',settings:'Sozlamalar'};
  document.getElementById('pageTitle').textContent=titles[page]||page;
  document.getElementById('pageSubtitle').textContent='';
  const pages={dashboard:renderDashboard,journal:renderJournal,students:renderStudents,groups:renderGroups,payments:renderPayments,teachers:renderTeachers,settings:renderSettings};
  if(pages[page])pages[page]();
}

// ===================== TOPBAR DATE =====================
function updateTopbarDate(){
  const now=new Date();
  const days=['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
  const months=['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
  document.getElementById('topbarDate').innerHTML=`<i class="fas fa-calendar-alt"></i>${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

// ===================== INIT APP =====================
function initApp(){
  buildSidebar();updateTopbarDate();
  navigateTo('dashboard');
}

// ===================== DASHBOARD =====================
function renderDashboard(){
  const students=DB.get('students').filter(s=>s.active);
  const groups=DB.get('groups');
  const teachers=DB.get('users').filter(u=>u.role==='teacher');
  const payments=DB.get('payments');
  const attendance=DB.get('attendance');
  const today=fmtDate();
  const todayAtt=attendance.filter(a=>a.date===today);
  const presentToday=todayAtt.filter(a=>a.present).length;
  const totalToday=todayAtt.length;
  const pct=totalToday?Math.round(presentToday/totalToday*100):0;

  // Payments this month
  const now=new Date();
  const monthPayments=payments.filter(p=>p.month===now.getMonth()+1&&p.year===now.getFullYear());
  const paidTotal=monthPayments.filter(p=>p.paid).reduce((s,p)=>s+p.amount,0);
  const totalExpected=monthPayments.reduce((s,p)=>s+p.amount,0);

  // Group attendance data
  const groupStats=groups.map(g=>{
    const gs=students.filter(s=>s.groupId===g.id);
    const gAtt=attendance.filter(a=>a.groupId===g.id&&a.date===today);
    const gPres=gAtt.filter(a=>a.present).length;
    return{name:g.name,total:gs.length,present:gPres,pct:gs.length?Math.round(gPres/gs.length*100):0};
  });

  // Recent attendance records
  const recentDates=[...new Set(attendance.map(a=>a.date))].sort().slice(-5).reverse();

  document.getElementById('mainContent').innerHTML=`
  <div class="page">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon navy"><i class="fas fa-user-graduate"></i></div>
        <div class="stat-info"><h3>${students.length}</h3><p>Jami o'quvchilar</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon gold"><i class="fas fa-layer-group"></i></div>
        <div class="stat-info"><h3>${groups.length}</h3><p>Faol guruhlar</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="fas fa-user-check"></i></div>
        <div class="stat-info"><h3>${pct}%</h3><p>Bugungi davomat</p>
          ${totalToday?`<div class="trend up"><i class="fas fa-arrow-up"></i>${presentToday}/${totalToday} o'quvchi</div>`:'<p style="font-size:11px;color:var(--text3)">Belgilanmagan</p>'}
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon ${paidTotal<totalExpected*0.7?'red':'green'}"><i class="fas fa-wallet"></i></div>
        <div class="stat-info"><h3>${Math.round(paidTotal/1000)}K</h3><p>Bu oy to'lovlar (so'm)</p>
          <div class="trend ${paidTotal>=totalExpected*0.8?'up':'down'}"><i class="fas fa-${paidTotal>=totalExpected*0.8?'arrow-up':'arrow-down'}"></i>${totalExpected?Math.round(paidTotal/totalExpected*100):0}% yig'ildi</div>
        </div>
      </div>
      ${can('admin')?`<div class="stat-card">
        <div class="stat-icon blue"><i class="fas fa-chalkboard-teacher"></i></div>
        <div class="stat-info"><h3>${teachers.length}</h3><p>O'qituvchilar</p></div>
      </div>`:''}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">
      <div class="card">
        <div class="card-header">
          <div><h3>Guruhlar davomati</h3><p>Bugungi ko'rsatkich</p></div>
        </div>
        <div class="card-body">
          ${groupStats.length?`<div class="mini-bar">${groupStats.map(g=>`
            <div class="mini-bar-row">
              <div class="mini-bar-label">${g.name}</div>
              <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${g.pct}%;background:${g.pct>=80?'var(--success)':g.pct>=60?'var(--gold-dark)':'var(--danger)'}"></div></div>
              <div class="mini-bar-pct" style="color:${g.pct>=80?'var(--success)':g.pct>=60?'var(--gold-dark)':'var(--danger)'}">${g.pct}%</div>
            </div>`).join('')}</div>`:'<p style="color:var(--text3);font-size:13px">Ma\'lumot yo\'q</p>'}
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div><h3>Bu oy to'lovlar</h3><p>${now.getFullYear()} / ${now.getMonth()+1}-oy</p></div>
        </div>
        <div class="card-body">
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="font-size:13px;color:var(--text2)">To'langan</span>
              <span style="font-size:13px;font-weight:600;color:var(--success)">${fmtMoney(paidTotal)}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill green" style="width:${totalExpected?Math.min(100,Math.round(paidTotal/totalExpected*100)):0}%"></div></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px">
            <div style="text-align:center;padding:12px;background:var(--success-bg);border-radius:8px">
              <div style="font-size:20px;font-weight:700;color:var(--success)">${monthPayments.filter(p=>p.paid).length}</div>
              <div style="font-size:11px;color:var(--success)">To'lagan</div>
            </div>
            <div style="text-align:center;padding:12px;background:var(--danger-bg);border-radius:8px">
              <div style="font-size:20px;font-weight:700;color:var(--danger)">${monthPayments.filter(p=>!p.paid).length}</div>
              <div style="font-size:11px;color:var(--danger)">To'lamagan</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div><h3>So'nggi davomat tarixi</h3><p>Oxirgi 5 kun</p></div>
        <div class="card-header-actions">
          <button class="btn btn-navy btn-sm" onclick="navigateTo('journal')"><i class="fas fa-clipboard-list"></i> Jurnalga o'tish</button>
        </div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Sana</th><th>Jami</th><th>Keldi</th><th>Kelmadi</th><th>Davomat %</th><th>Vazifa %</th></tr></thead>
            <tbody>
              ${recentDates.map(date=>{
                const recs=attendance.filter(a=>a.date===date);
                const pres=recs.filter(a=>a.present).length;
                const hw=recs.filter(a=>a.homeworkDone).length;
                const pp=recs.length?Math.round(pres/recs.length*100):0;
                const hp=pres?Math.round(hw/pres*100):0;
                return`<tr>
                  <td style="font-weight:500">${fmtDateUz(date)}</td>
                  <td>${recs.length}</td>
                  <td><span class="badge badge-success">${pres}</span></td>
                  <td><span class="badge badge-danger">${recs.length-pres}</span></td>
                  <td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="width:80px"><div class="progress-fill ${pp>=80?'green':pp>=60?'gold':'red'}" style="width:${pp}%"></div></div><span style="font-size:12px;font-weight:600">${pp}%</span></div></td>
                  <td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="width:80px"><div class="progress-fill gold" style="width:${hp}%"></div></div><span style="font-size:12px;font-weight:600">${hp}%</span></div></td>
                </tr>`;
              }).join('')||'<tr><td colspan="6" class="no-data"><i class="fas fa-inbox"></i><br>Ma\'lumot yo\'q</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>`;
}

// ===================== JOURNAL =====================
let journalGroupId='';
let journalDate=fmtDate();
function renderJournal(){
  const groups=DB.get('groups');
  const myGroups=currentUser.role==='teacher'?groups.filter(g=>currentUser.groupIds.includes(g.id)):groups;
  if(!journalGroupId&&myGroups.length)journalGroupId=myGroups[0].id;

  document.getElementById('mainContent').innerHTML=`
  <div class="page">
    <div class="toolbar">
      <select class="filter" id="journalGroupSel" onchange="journalGroupId=this.value;renderJournalTable()">
        ${myGroups.map(g=>`<option value="${g.id}" ${g.id===journalGroupId?'selected':''}>${g.name}</option>`).join('')}
      </select>
      <input type="date" id="journalDate" class="filter" value="${journalDate}" onchange="journalDate=this.value;renderJournalTable()" style="padding:9px 12px">
      <button class="btn btn-outline btn-sm" onclick="journalDate=fmtDate();document.getElementById('journalDate').value=journalDate;renderJournalTable()"><i class="fas fa-calendar-day"></i> Bugun</button>
      <button class="btn btn-gold btn-sm" onclick="saveJournal()"><i class="fas fa-save"></i> Saqlash</button>
      <button class="btn btn-outline btn-sm" onclick="renderHistory()"><i class="fas fa-history"></i> Tarix</button>
    </div>
    <div id="journalStatsBar"></div>
    <div class="card" id="journalTableCard"></div>
  </div>`;
  renderJournalTable();
}

let journalData={};
function renderJournalTable(){
  const students=DB.get('students').filter(s=>s.groupId===journalGroupId&&s.active);
  const attendance=DB.get('attendance');
  const existing=attendance.filter(a=>a.groupId===journalGroupId&&a.date===journalDate);
  journalData={};
  students.forEach(s=>{
    const rec=existing.find(a=>a.studentId===s.id);
    journalData[s.id]={present:rec?rec.present:false,homeworkDone:rec?rec.homeworkDone:false,note:rec?rec.note:''};
  });
  updateJournalStats(students);
  document.getElementById('journalTableCard').innerHTML=`
    <div class="card-header">
      <div>
        <h3><i class="fas fa-clipboard-list" style="color:var(--navy-600);margin-right:8px"></i>Davomat belgisi</h3>
        <p>${fmtDateUz(journalDate)} — ${students.length} o'quvchi</p>
      </div>
    </div>

            <th style="text-align:center;width:120px"><i class="fas fa-book-open" style="color:var(--gold-dark)"></i> Vazifa</th>
            <th>Izoh</th>
          </tr></thead>
          <tbody>
            ${students.length?students.map((s,i)=>`
              <tr id="jrow_${s.id}">
                <td style="color:var(--text3);font-weight:500">${i+1}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:10px">
                    <div style="width:32px;height:32px;border-radius:50%;background:${avatarColor(s.id)};display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;flex-shrink:0">${getInitials(s.name)}</div>
                    <span style="font-weight:500">${s.name}</span>
                  </div>
                </td>
                <td class="toggle-cell">
                  <label class="toggle" title="Keldi/Kelmadi">
                    <input type="checkbox" ${journalData[s.id].present?'checked':''} onchange="togglePresent('${s.id}',this.checked)">
                    <span class="toggle-slider"></span>
                  </label>
                </td>
                <td class="toggle-cell">
                  <label class="toggle hw" title="Vazifa bajargan/bajarmagan">
                    <input type="checkbox" ${journalData[s.id].homeworkDone?'checked':''} ${!journalData[s.id].present?'disabled':''} onchange="toggleHW('${s.id}',this.checked)" id="hw_${s.id}">
                    <span class="toggle-slider"></span>
                  </label>
                </td>
                <td><input type="text" placeholder="Izoh..." value="${journalData[s.id].note||''}" oninput="journalData['${s.id}'].note=this.value" style="border:1px solid #eef2ff;border-radius:6px;padding:5px 10px;font-size:12.5px;width:100%;background:transparent;outline:none;color:var(--text)"></td>

        </table>

function togglePresent(sid,val){
  journalData[sid].present=val;
  if(!val){journalData[sid].homeworkDone=false;const hw=document.getElementById('hw_'+sid);if(hw){hw.checked=false;hw.disabled=true;}}
  else{const hw=document.getElementById('hw_'+sid);if(hw)hw.disabled=false;}
  const students=DB.get('students').filter(s=>s.groupId===journalGroupId&&s.active);
  updateJournalStats(students);
}
function toggleHW(sid,val){journalData[sid].homeworkDone=val;}

function updateJournalStats(students){
  const vals=Object.values(journalData);
  const total=students.length;
  const present=vals.filter(v=>v.present).length;
  const absent=total-present;
  const hwDone=vals.filter(v=>v.homeworkDone).length;
  const pct=total?Math.round(present/total*100):0;
  const hwPct=present?Math.round(hwDone/present*100):0;
  document.getElementById('journalStatsBar').innerHTML=`
    <div class="journal-stats">
      <div class="j-stat navy"><div class="num">${total}</div><div class="lbl">Jami</div></div>
      <div class="j-stat green"><div class="num">${present} <small style="font-size:16px">(${pct}%)</small></div><div class="lbl">Keldi</div></div>
      <div class="j-stat red"><div class="num">${absent}</div><div class="lbl">Kelmadi</div></div>
      <div class="j-stat gold"><div class="num">${hwDone} <small style="font-size:16px">(${hwPct}%)</small></div><div class="lbl">Vazifa bajargan</div></div>
    </div>`;
}

function saveJournal(){
  const students=DB.get('students').filter(s=>s.groupId===journalGroupId&&s.active);
  let attendance=DB.get('attendance');
  students.forEach(s=>{
    const idx=attendance.findIndex(a=>a.studentId===s.id&&a.groupId===journalGroupId&&a.date===journalDate);
    const rec={id:idx>=0?attendance[idx].id:uid(),studentId:s.id,groupId:journalGroupId,date:journalDate,present:journalData[s.id].present,homeworkDone:journalData[s.id].homeworkDone,note:journalData[s.id].note||''};
    if(idx>=0)attendance[idx]=rec;else attendance.push(rec);
  });
  DB.set('attendance',attendance);
  toast('Jurnal saqlandi!','success');
}

function renderHistory(){
  const students=DB.get('students').filter(s=>s.groupId===journalGroupId&&s.active);
  const attendance=DB.get('attendance').filter(a=>a.groupId===journalGroupId);
  const dates=[...new Set(attendance.map(a=>a.date))].sort().reverse().slice(0,20);
  openModal('Davomat tarixi','modal-lg',`
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>O'quvchi</th>
        ${dates.map(d=>`<th style="text-align:center;min-width:80px">${fmtDateUz(d)}</th>`).join('')}
        <th style="text-align:center">Umumiy %</th>
      </tr></thead>
      <tbody class="history-row">
        ${students.map(s=>{
          const sRecs=attendance.filter(a=>a.studentId===s.id);
          const pct=sRecs.length?Math.round(sRecs.filter(a=>a.present).length/sRecs.length*100):0;
          return`<tr>
            <td style="font-weight:500;white-space:nowrap">${s.name}</td>
            ${dates.map(d=>{
              const r=sRecs.find(a=>a.date===d);
              if(!r)return`<td style="text-align:center;color:var(--text3)">—</td>`;
              return`<td style="text-align:center">
                <span class="att-cell ${r.present?'att-present':'att-absent'}">${r.present?'✓':'✗'}</span>
                ${r.present?`<br><span class="att-cell ${r.homeworkDone?'hw-done':'hw-miss'}" style="margin-top:3px">${r.homeworkDone?'V':'—'}</span>`:''}
              </td>`;
            }).join('')}
            <td style="text-align:center"><span class="badge ${pct>=80?'badge-success':pct>=60?'badge-warn':'badge-danger'}">${pct}%</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
    <div style="margin-top:16px;font-size:12px;color:var(--text3)">
      <span class="att-cell att-present">✓</span> Keldi &nbsp;
      <span class="att-cell att-absent">✗</span> Kelmadi &nbsp;
      <span class="att-cell hw-done">V</span> Vazifa bajardi &nbsp;
      <span class="att-cell hw-miss">—</span> Bajarmadi
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Yopish</button>`);
}

function saveStudent(id){
  const name=document.getElementById('sName').value.trim();
  const groupId=document.getElementById('sGroup').value;
  if(!name)return toast('Ism majburiy!','error');
  const students=DB.get('students');
  if(id){
    const idx=students.findIndex(s=>s.id===id);
    students[idx]={...students[idx],name,groupId,phone:v('sPhone'),parentPhone:v('sParent'),address:v('sAddr'),joinDate:v('sJoin'),note:v('sNote'),active:document.getElementById('sActive').value==='1'};
  } else {
    students.push({id:uid(),name,groupId,phone:v('sPhone'),parentPhone:v('sParent'),address:v('sAddr'),joinDate:v('sJoin')||fmtDate(),note:v('sNote'),active:true});
  }
  DB.set('students',students);closeModal();renderStudents();toast(id?'O\'quvchi yangilandi!':'O\'quvchi qo\'shildi!','success');

function deleteStudent(id){

}

  else groups.push({id:uid(),...data});
  DB.set('groups',groups);
  // Update teacher groupIds
  const users=DB.get('users');
  if(data.teacherId){
    const tidx=users.findIndex(u=>u.id===data.teacherId);
    if(tidx>=0&&!users[tidx].groupIds.includes(id||'_new'))users[tidx].groupIds.push(id||groups[groups.length-1].id);
    DB.set('users',users);
  }
  closeModal();renderGroups();toast(id?'Guruh yangilandi!':'Guruh qo\'shildi!','success');
}

function deleteGroup(id){
  if(!confirm('Guruhni o\'chirishni tasdiqlaysizmi? Bu guruh o\'quvchilari ham o\'chiriladi!'))return;
  DB.set('groups',DB.get('groups').filter(g=>g.id!==id));
  DB.set('students',DB.get('students').filter(s=>s.groupId!==id));
  renderGroups();toast('Guruh o\'chirildi','info');
}

// ===================== PAYMENTS =====================
let payGroup='all',payYear=new Date().getFullYear(),payMonth=0;
const MONTHS=['Jan','Feb','Mar','Apr','May','Iyn','Iyl','Avg','Sen','Okt','Noy','Dek'];
function renderPayments(){
  const groups=DB.get('groups');
  const students=DB.get('students').filter(s=>s.active);
  let filtStudents=payGroup==='all'?students:students.filter(s=>s.groupId===payGroup);
  const payments=DB.get('payments');
  const now=new Date();

  // Ensure payments exist for all students for this year
  filtStudents.forEach(s=>{
    const grp=groups.find(g=>g.id===s.groupId);
    if(!grp)return;
    for(let m=1;m<=12;m++){
      const ex=payments.find(p=>p.studentId===s.id&&p.month===m&&p.year===payYear);
      if(!ex)payments.push({id:uid(),studentId:s.id,groupId:s.groupId,month:m,year:payYear,amount:grp.monthlyFee,paid:false,paidDate:null,discount:0});
    }
  });
  DB.set('payments',payments);

  const displayMonths=Array.from({length:12},(_,i)=>i+1);
  const totalExpected=payments.filter(p=>filtStudents.find(s=>s.id===p.studentId)&&p.year===payYear).reduce((s,p)=>s+p.amount*(1-p.discount/100),0);
  const totalPaid=payments.filter(p=>filtStudents.find(s=>s.id===p.studentId)&&p.year===payYear&&p.paid).reduce((s,p)=>s+p.amount*(1-p.discount/100),0);
  const outstanding=totalExpected-totalPaid;

  document.getElementById('mainContent').innerHTML=`
  <div class="page">
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:18px">
      <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h3>${Math.round(totalPaid/1000)}K</h3><p>To'langan (so'm)</p></div></div>
      <div class="stat-card"><div class="stat-icon red"><i class="fas fa-times-circle"></i></div><div class="stat-info"><h3>${Math.round(outstanding/1000)}K</h3><p>Qoldiq (so'm)</p></div></div>
      <div class="stat-card"><div class="stat-icon gold"><i class="fas fa-percentage"></i></div><div class="stat-info"><h3>${totalExpected?Math.round(totalPaid/totalExpected*100):0}%</h3><p>Yig'ildi</p></div></div>
    </div>
    <div class="toolbar">
      <select class="filter" onchange="payGroup=this.value;renderPayments()">
        <option value="all">Barcha guruhlar</option>
        ${groups.map(g=>`<option value="${g.id}" ${g.id===payGroup?'selected':''}>${g.name}</option>`).join('')}
      </select>
      <select class="filter" onchange="payYear=parseInt(this.value);renderPayments()">
        ${[2024,2025,2026].map(y=>`<option value="${y}" ${y===payYear?'selected':''}>${y} yil</option>`).join('')}
      </select>
    </div>
    <div class="card">
      <div class="card-header">
        <div><h3>Oylik to'lovlar — ${payYear}</h3><p>Doiraga bosib to'lov holatini o'zgartirish</p></div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-wrap">
          <table style="table-layout:fixed">
            <thead><tr>
              <th style="width:180px">O'quvchi</th>
              ${displayMonths.map(m=>`<th class="payment-month-cell">${MONTHS[m-1]}</th>`).join('')}
              <th style="width:80px;text-align:center">Umumiy</th>
            </tr></thead>
            <tbody>
              ${filtStudents.map(s=>{
                const sPayments=payments.filter(p=>p.studentId===s.id&&p.year===payYear);
                const paidCount=sPayments.filter(p=>p.paid).length;
                const paidSum=sPayments.filter(p=>p.paid).reduce((t,p)=>t+p.amount*(1-p.discount/100),0);
                return`<tr>
                  <td>
                    <div style="display:flex;align-items:center;gap:8px">
                      <div style="width:28px;height:28px;border-radius:50%;background:${avatarColor(s.id)};display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;flex-shrink:0">${getInitials(s.name)}</div>
                      <span style="font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span>
                    </div>
                  </td>
                  ${displayMonths.map(m=>{
                    const pay=sPayments.find(p=>p.month===m);
                    return`<td class="payment-month-cell">
                      <div class="pay-dot ${pay&&pay.paid?'paid':'unpaid'}" 
                        onclick="togglePayment('${pay?pay.id:''}','${s.id}',${m},'${payYear}')"
                        title="${pay&&pay.paid?(pay.paidDate?fmtDateUz(pay.paidDate):'To\'langan'):'To\'lanmagan'}"
                      >${pay&&pay.paid?'✓':'—'}</div>
                    </td>`;
                  }).join('')}
                  <td style="text-align:center">
                    <span class="badge ${paidCount===12?'badge-success':paidCount>0?'badge-warn':'badge-danger'}" style="font-size:11px">${paidCount}/12</span>
                    <div style="font-size:10px;color:var(--text3);margin-top:3px">${Math.round(paidSum/1000)}K</div>
                  </td>
                </tr>`;
              }).join('')||'<tr><td colspan="14" class="no-data">O\'quvchi yo\'q</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>`;
}

function togglePayment(pid,studentId,month,year){
  const payments=DB.get('payments');
  let pay=payments.find(p=>p.id===pid);
  if(!pay){
    // create
    const s=DB.get('students').find(x=>x.id===studentId);
    const grp=DB.get('groups').find(g=>g.id===s.groupId);
    pay={id:uid(),studentId,groupId:s.groupId,month:parseInt(month),year:parseInt(year),amount:grp?grp.monthlyFee:0,paid:false,paidDate:null,discount:0};
    payments.push(pay);
  }
  pay.paid=!pay.paid;
  pay.paidDate=pay.paid?fmtDate():null;
  DB.set('payments',payments);
  renderPayments();
  toast(pay.paid?'To\'lov belgilandi!':'To\'lov bekor qilindi','info');
}

function openTeacherModal(id){
  const groups=DB.get('groups');
  const t=id?DB.get('users').find(u=>u.id===id):null;
  openModal(id?'O\'qituvchini tahrirlash':'Yangi o\'qituvchi','',`
    <div class="form-row">
      <div class="form-group"><label>Ism Familiya *</label><input type="text" id="tName" value="${t?t.name:''}" placeholder="Karimova Malika"></div>
      <div class="form-group"><label>Fan</label><input type="text" id="tSubject" value="${t?t.subject||'':''}" placeholder="Matematika"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Foydalanuvchi nomi *</label><input type="text" id="tUsername" value="${t?t.username:''}" placeholder="teacher1"></div>
      <div class="form-group"><label>Parol ${id?'(bo\'sh qoldirsa o\'zgarmaydi)':' *'}</label><input type="password" id="tPassword" placeholder="••••••••"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Telefon</label><input type="text" id="tPhone" value="${t?t.phone||'':''}" placeholder="+998901234567"></div>
      <div class="form-group"><label>Guruhlar</label>
        <select id="tGroups" multiple style="height:80px">
          ${groups.map(g=>`<option value="${g.id}" ${t&&t.groupIds.includes(g.id)?'selected':''}>${g.name}</option>`).join('')}
        </select>
        <p class="form-hint">Ctrl+bosib bir nechtasini tanlang</p>
      </div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Bekor</button>
     <button class="btn btn-navy" onclick="saveTeacher('${id||''}')"><i class="fas fa-save"></i> Saqlash</button>`);
}

function saveTeacher(id){
  const name=v('tName');const username=v('tUsername');
  if(!name||!username)return toast('Ism va login majburiy!','error');
  const users=DB.get('users');
  const selGroups=[...document.getElementById('tGroups').selectedOptions].map(o=>o.value);
  const pwd=v('tPassword');
  if(id){
    const idx=users.findIndex(u=>u.id===id);
    users[idx]={...users[idx],name,username,subject:v('tSubject'),phone:v('tPhone'),groupIds:selGroups,...(pwd?{password:pwd}:{})};
  } else {
    if(!pwd)return toast('Parol majburiy!','error');
    const ex=users.find(u=>u.username===username);
    if(ex)return toast('Bu username allaqachon mavjud!','error');
    users.push({id:uid(),name,username,password:pwd,role:'teacher',subject:v('tSubject'),phone:v('tPhone'),groupIds:selGroups});
  }
  DB.set('users',users);closeModal();renderTeachers();toast(id?'O\'qituvchi yangilandi!':'O\'qituvchi qo\'shildi!','success');
}

function deleteTeacher(id){
  if(!confirm('O\'qituvchini o\'chirishni tasdiqlaysizmi?'))return;
  DB.set('users',DB.get('users').filter(u=>u.id!==id));
  renderTeachers();toast('O\'qituvchi o\'chirildi','info');
}

function resetPassword(id){
  const newPwd=prompt('Yangi parol kiriting:');
  if(!newPwd)return;
  const users=DB.get('users');
  const idx=users.findIndex(u=>u.id===id);
  users[idx].password=newPwd;
  DB.set('users',users);toast('Parol yangilandi!','success');
}

          <button class="btn btn-danger" onclick="if(confirm('Hamma ma\\'lumotlarni tozalashni tasdiqlaysizmi?')){localStorage.clear();location.reload()}"><i class="fas fa-trash"></i> Tizimni tozalash</button>
        </div>

function saveProfile(){
  const users=DB.get('users');
  const idx=users.findIndex(u=>u.id===currentUser.id);
  users[idx].name=v('setName');users[idx].phone=v('setPhone');
  currentUser=users[idx];DB.set('users',users);DB.setOne('currentUser',currentUser);
  buildSidebar();toast('Profil yangilandi!','success');
}

function changePassword(){
  const cur=v('curPwd');const np=v('newPwd');const cf=v('cfmPwd');
  if(cur!==currentUser.password)return toast('Joriy parol noto\'g\'ri!','error');
  if(np.length<6)return toast('Yangi parol kamida 6 belgi bo\'lishi kerak!','error');
  if(np!==cf)return toast('Parollar mos emas!','error');
  const users=DB.get('users');
  const idx=users.findIndex(u=>u.id===currentUser.id);
  users[idx].password=np;currentUser.password=np;
  DB.set('users',users);DB.setOne('currentUser',currentUser);
  document.getElementById('curPwd').value='';document.getElementById('newPwd').value='';document.getElementById('cfmPwd').value='';
  toast('Parol muvaffaqiyatli o\'zgartirildi!','success');
}

function exportData(){
  const data={users:DB.get('users'),groups:DB.get('groups'),students:DB.get('students'),attendance:DB.get('attendance'),payments:DB.get('payments')};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`student-academy-backup-${fmtDate()}.json`;a.click();
  toast('Ma\'lumotlar eksport qilindi!','success');
}

// ===================== MODAL =====================
function openModal(title,extraClass,body,footer){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFooter').innerHTML=footer||'';
  const box=document.getElementById('modalBox');
  box.className='modal'+(extraClass?' '+extraClass:'');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ===================== TOAST =====================
function toast(msg,type='info'){
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  el.className='toast-item '+type;
  el.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'}"></i>${msg}`;
  t.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
